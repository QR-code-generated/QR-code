<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

  <title>Random Slika</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      min-height:100vh;
      background:#0f0f0f;

      display:flex;
      justify-content:center;
      align-items:center;

      overflow:hidden;

      font-family:Arial, sans-serif;
    }

    .container{
      width:100%;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:16px;
    }

    .image-wrapper{
      width:100%;
      max-width:700px;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    img{
      width:100%;
      height:auto;

      max-height:92vh;

      object-fit:contain;

      border-radius:18px;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.45);

      user-select:none;
      -webkit-user-drag:none;

      animation:fadeIn .35s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:scale(0.97);
      }

      to{
        opacity:1;
        transform:scale(1);
      }
    }

    /* manji mobiteli */
    @media (max-width:480px){

      .container{
        padding:10px;
      }

      img{
        border-radius:14px;
        max-height:95vh;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="image-wrapper">
      <img id="randomImage" src="" alt="Random slika">
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
